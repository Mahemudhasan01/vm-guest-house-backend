# =========================================
# APPLICATION
# =========================================
spring.application.name=guesthouse-management
server.port=8080
user.service.url=http://localhost:8080/user

# =========================================
# POSTGRESQL DATABASE
# =========================================

spring.datasource.url=jdbc:postgresql://localhost:5432/guesthouse_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================================
# FILE UPLOAD
# =========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# =========================================
# JACKSON JSON
# =========================================
spring.jackson.serialization.fail-on-empty-beans=false

# =========================================
# LOGGING
# =========================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================================
# JWT (FUTURE USE)
# =========================================
app.jwt.secret=your-super-secret-key
app.jwt.expiration=86400000

# =========================================
# FILE STORAGE
# =========================================
app.file.upload-dir=uploads/

# =========================================
# PATHIK INTEGRATION (FUTURE)
# =========================================
app.pathik.enabled=false

# =========================================
# OCR CONFIG (FUTURE)
# =========================================
app.ocr.enabled=false